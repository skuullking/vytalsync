# Secret Kubernetes – Credentials PostgreSQL
#
# Un Secret stocke des données sensibles (mots de passe, tokens, clés) sous
# forme encodée en base64. Les pods y accèdent via des variables d'environnement
# ou des volumes, sans que les valeurs apparaissent en clair dans le Deployment.
#
# IMPORTANT : les valeurs ci-dessous sont des EXEMPLES (base64 de placeholders).
# En production, utiliser des outils comme Sealed Secrets, HashiCorp Vault ou
# External Secrets Operator pour gérer les secrets de manière sécurisée.
# Ne jamais commiter ce fichier avec de vraies valeurs dans Git.
#
# Injection dans le pod (voir backend-deployment.yaml) :
#   env:
#     - name: POSTGRES_PASSWORD
#       valueFrom:
#         secretKeyRef:
#           name: vytalsync-db-secret
#           key: postgres-password
#
# Comment encoder en base64 :
#   echo -n "mon_mot_de_passe" | base64

apiVersion: v1
kind: Secret
metadata:
  name: vytalsync-db-secret
  labels:
    app: vytalsync
type: Opaque
data:
  # echo -n "vytalsync_user" | base64
  postgres-user: dnl0YWxzeW5jX3VzZXI=
  # echo -n "changeme" | base64  ← À REMPLACER par une vraie valeur forte
  postgres-password: Y2hhbmdlbWU=
  # echo -n "vytalsync" | base64
  postgres-db: dnl0YWxzeW5j
