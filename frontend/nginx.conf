server {
    listen 80;
    server_name _;

    # Fichiers statiques servis depuis /usr/share/nginx/html
    root /usr/share/nginx/html;
    index index.html;

    # Proxy vers le backend pour toutes les requêtes /api/* et /health
    # Cela évite les problèmes CORS : le navigateur ne fait qu'un seul domaine
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /health {
        proxy_pass http://backend:3000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # SPA fallback : toute autre URL renvoie index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
